name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      run: |
        echo $ENCODED_STRING > keystore-b64.txt
        base64 -d keystore-b64.txt > "$RUNNER_TEMP/key.jks"

    - name: Build bundle
      env:
        RELEASE_STORE_FILE: ${{ runner.temp }}/key.jks
        RELEASE_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: signing_key
        RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        cd android
        ./gradlew bundleRelease

    - id: auth
      name: 'Authenticate to Google Cloud'
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: projects/1037008586878/locations/global/workloadIdentityPools/github/providers/github 
        service_account: github-release@task-wizard-490917.iam.gserviceaccount.com

    - name: Release to internal
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
        packageName: com.dkhalife.tasks
        releaseFiles: android/app/build/outputs/bundle/release/*.aab
        track: internal
