name: Full Release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Application
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      # build frontend 
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install Dependencies
        run: |
          cd frontend
          yarn install
      - name: Build Frontend
        run: |
          export VITE_BACKEND_VERSION=$(git tag --sort=-creatordate | sed -n '1p' | sed 's/^v//')
          cd frontend
          yarn build

      - name: Copy Frontend
        run: |
          rm -rf apiserver/frontend/dist
          cp -r frontend/dist apiserver/frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25
          check-latest: true
          cache: true 

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@90a3faa9d0182683851fbfa97ca1a2cb983bfca3 #v6.2.1
        with:
          distribution: goreleaser
          version: latest
          args: build --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            frontend/dist/
          retention-days: 1

  release-canary:
    runs-on: ubuntu-latest
    environment: canary
    name: Release to Canary
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts          
          path: apiserver

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25
          check-latest: true
          cache: true

      - name: Run GoReleaser for GitHub Release
        uses: goreleaser/goreleaser-action@90a3faa9d0182683851fbfa97ca1a2cb983bfca3 #v6.2.1
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update changelog
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          changelog=$(echo -e "## Changelog\n")
    
          latestTag=$(git tag --sort=-creatordate | sed -n '1p')
          previousTag=$(git tag --sort=-creatordate | sed -n '2p')
          echo "Evaluating backend repo:"
          echo "Latest tag: $latestTag"
          echo "Previous tag: $previousTag"
  
          url="https://github.com/${{ github.repository }}/compare/$previousTag...$latestTag"
          changelog+=$(echo -e "\n### Changes in [backend]($url)\n\n$(git log --no-merges --pretty=format:"* %s" $previousTag...$latestTag)")
  
          echo "Updating changelog"
          gh release edit "$latestTag" --notes "$changelog"

      - name: Set up QEMU 
        uses: docker/setup-qemu-action@4574d27a4764455b42196d70a065bc6853246a25 #v3.4.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca #v3.9.0

      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push API image
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 #v6.13.0
        with:
          context: ./apiserver
          file: ./apiserver/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-api:canary, ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-api:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            RELEASE_TAG=${{github.ref_name}}

      - name: Build and push MCP image
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 #v6.13.0
        with:
          context: ./mcpserver
          file: ./mcpserver/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-mcp:canary, ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-mcp:${{ github.ref_name }}
          platforms: linux/amd64

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        run: |
          echo $ENCODED_STRING > keystore-b64.txt
          base64 -d keystore-b64.txt > "$RUNNER_TEMP/key.jks"

      - name: Build Android bundle
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: signing_key
          RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        id: gcp-auth
        with:
          workload_identity_provider: projects/1037008586878/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-release@task-wizard-490917.iam.gserviceaccount.com

      - name: Release Android to internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          packageName: com.dkhalife.tasks
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal

  release-production:
    runs-on: ubuntu-latest
    environment: stable
    name: Promote to Production Release
    needs: release-canary
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Promote GitHub Release to Production
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the current tag
          TAG="${{ github.ref_name }}"
          echo "Promoting release $TAG to production"
          
          # Update the release to remove prerelease flag
          gh release edit "$TAG" --prerelease=false --latest
          
          echo "Successfully promoted $TAG to production release"

      - name: Set up QEMU 
        uses: docker/setup-qemu-action@4574d27a4764455b42196d70a065bc6853246a25 #v3.4.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca #v3.9.0

      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Push API image tags
        run: |
          # Promote multi-platform image manifest from canary to production tags
          docker buildx imagetools create \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-api:release \
            ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-api:${{ github.ref_name }}

      - name: Push MCP image tags
        run: |
          # Promote multi-platform image manifest from canary to production tags
          docker buildx imagetools create \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-mcp:release \
            ${{ secrets.ACR_NAME }}.azurecr.io/task-wizard-mcp:${{ github.ref_name }}
