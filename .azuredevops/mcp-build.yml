name: $(Date:yyMMdd).00.$(Rev:r)

trigger:
  branches:
    include:
    - main
  paths:
    include:
    - mcpserver/**

pr:
  branches:
    include:
    - main
  paths:
    include:
    - mcpserver/**

resources:
  repositories:
  - repository: templates
    type: github
    name: dkhalife/Pipeline.Templates
    endpoint: github
    ref: refs/tags/latest

extends:
  template: pipeline.yml@templates
  parameters:
    stages:
    - stage: build
      templateContext:
        intent: build
      jobs:
      - job: app
        templateContext:
          dotnet:
          - name: mcp
            sdkVersion: '9.x'
            projects: mcpserver/**/*.csproj
            configuration: Release
            test: false
