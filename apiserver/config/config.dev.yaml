database:
  type: sqlite
  migration: true
  path: task-wizard.db
server:
  host_name: localhost
  port: 2021
  read_timeout: 2s
  write_timeout: 1s
  rate_period: 60s
  rate_limit: 300
  serve_frontend: false
  registration: true
  log_level: "debug"
  allowed_origins:
    - http://localhost:5173
  allow_cors_credentials: true
scheduler_jobs:
  due_frequency: 1m
  overdue_frequency: 1m
  notification_cleanup: 10s
