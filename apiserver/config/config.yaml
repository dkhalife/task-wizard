database:
  type: sqlite
  migration: true
  path: /config/task-wizard.db
entra:
  enabled: false
  tenant_id: ""
  client_id: ""
  audience: ""
  issuer: ""
server:
  host_name: example.com
  port: 2021
  read_timeout: 2s
  write_timeout: 1s
  rate_period: 60s
  rate_limit: 300
  serve_frontend: true
  registration: true
  log_level: "warn"
scheduler_jobs:
  due_frequency: 5m
  overdue_frequency: 24h
  notification_cleanup: 10m
